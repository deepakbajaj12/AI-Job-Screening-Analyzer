name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  stale-pr-head-guard:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check PR head freshness
        id: freshness
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          MAX_BEHIND_COMMITS: ${{ vars.CI_MAX_BEHIND_COMMITS || '0' }}
        run: |
          set -euo pipefail
          echo "Base ref: ${BASE_REF}"
          echo "Base sha: ${BASE_SHA}"
          echo "Head sha: ${HEAD_SHA}"
          echo "Max behind commits allowed: ${MAX_BEHIND_COMMITS}"

          # Ensure base branch history is available even on shallow or detached checkouts.
          git fetch --no-tags --prune origin "+refs/heads/${BASE_REF}:refs/remotes/origin/${BASE_REF}"

          BEHIND_COUNT=$(git rev-list --count "${HEAD_SHA}..${BASE_SHA}")
          echo "PR head is behind base by ${BEHIND_COUNT} commit(s)."
          echo "behind_count=${BEHIND_COUNT}" >> "$GITHUB_OUTPUT"
          echo "max_behind=${MAX_BEHIND_COMMITS}" >> "$GITHUB_OUTPUT"

          if [ "${BEHIND_COUNT}" -gt "${MAX_BEHIND_COMMITS}" ]; then
            echo "stale=true" >> "$GITHUB_OUTPUT"
          else
            echo "stale=false" >> "$GITHUB_OUTPUT"
            echo "PR head is up to date with base branch."
          fi

      - name: Comment on stale PR
        if: steps.freshness.outputs.stale == 'true'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- stale-pr-head-guard -->';
            const behind = '${{ steps.freshness.outputs.behind_count }}';
            const maxBehind = '${{ steps.freshness.outputs.max_behind }}';
            const baseRef = context.payload.pull_request.base.ref;
            const body = `${marker}
            CI guard: this PR branch is behind ${baseRef} by ${behind} commit(s), which exceeds the allowed threshold (${maxBehind}).

            Please update this branch before re-running checks.

            Suggested commands:
            git fetch origin
            git rebase origin/${baseRef}`;

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

      - name: Fail on stale PR head
        if: steps.freshness.outputs.stale == 'true'
        run: |
          echo "::error::PR head is stale by ${{ steps.freshness.outputs.behind_count }} commit(s). Rebase or merge base branch and push again."
          exit 1

  backend-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m venv venv
          . venv/bin/activate
          pip install -r backend/requirements.txt
      - name: Verify test file and conftest files exist
        run: |
          echo "=== Checking test files ==="
          echo "conftest.py (root):"
          head -5 conftest.py || echo "NOT FOUND"
          echo ""
          echo "tests/conftest.py:"
          head -5 tests/conftest.py || echo "NOT FOUND"
          echo ""
          echo "tests/test_health_and_version.py:"
          head -20 tests/test_health_and_version.py || echo "NOT FOUND"
      - name: Run tests
        env:
          DEV_BYPASS_AUTH: '1'
          PYTHONPATH: ${{ github.workspace }}
        run: |
          . venv/bin/activate
          echo "Python path: $(which python)"
          echo "Python version: $(python --version)"
          echo "Current dir: $(pwd)"
          echo "sys.path will include: $PYTHONPATH"
          echo "Running: pytest tests/ -q"
          pytest tests/ -q

  backend-node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install deps
        run: |
          cd backend
          npm install
      - name: Lint placeholder
        run: echo "Add ESLint config in future"

  frontend-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Clean install
        run: |
          rm -rf node_modules package-lock.json
          npm install --legacy-peer-deps
      - name: Verify peer dependencies
        run: |
          echo "Checking for @testing-library/dom..."
          ls -la node_modules/@testing-library/ || echo "Directory not found"
          test -d node_modules/@testing-library/dom && echo "✓ @testing-library/dom is installed" || echo "✗ @testing-library/dom is NOT installed"
      - name: Run tests
        run: npm test
      - name: Build
        run: npm run build